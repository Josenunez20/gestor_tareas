{% extends 'base.html' %}

{% block title %}Iniciar Sesión | Gestor de Tareas{% endblock %}

{% block content %}
<style>
    :root {
        --primary-color: #4361ee;
        --secondary-color: #3f37c9;
        --success-color: #4cc9f0;
        --danger-color: #f72585;
        --warning-color: #f8961e;
        --dark-color: #1e1e2f;
        --light-color: #f8f9fa;
        --gray-color: #6c757d;
    }
    
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .auth-container {
        width: 100%;
        max-width: 450px;
        margin: 20px;
        padding: 0 15px;
    }
    
    /* Tarjetas con efecto glassmorphism */
    .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        padding: 2.5rem 2rem;
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: transform 0.3s ease;
    }
    
    .glass-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }
    
    /* Botones modernos */
    .btn-modern {
        border-radius: 50px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9rem;
        border: none;
        cursor: pointer;
        width: 100%;
    }
    
    .btn-modern:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }
    
    .btn-modern:active {
        transform: translateY(0);
    }
    
    .btn-primary-modern {
        background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
        color: white;
    }
    
    /* Formularios modernos */
    .modern-input {
        border: 2px solid #e0e0e0;
        border-radius: 50px;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        transition: all 0.3s ease;
        width: 100%;
        background: white;
    }
    
    .modern-input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        outline: none;
    }
    
    .modern-input:hover {
        border-color: var(--secondary-color);
    }
    
    /* Labels */
    .form-label {
        font-weight: 600;
        color: var(--dark-color);
        margin-bottom: 0.5rem;
        display: block;
        font-size: 0.95rem;
    }
    
    /* Animaciones */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .fade-in {
        animation: fadeIn 0.5s ease forwards;
    }
    
    /* Alerts personalizados */
    .modern-alert {
        border-radius: 15px;
        border: none;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        padding: 1rem 1.5rem;
        animation: slideIn 0.3s ease;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
    }
    
    @keyframes slideIn {
        from {
            transform: translateX(-100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    .alert-danger {
        background: linear-gradient(45deg, #f72585, #b5179e);
        color: white;
    }
    
    /* Espaciado específico para formularios de autenticación */
    .auth-form {
        margin-top: 1rem;
    }
    
    .form-group {
        margin-bottom: 1.25rem;
    }
    
    .auth-footer {
        margin-top: 2rem;
        text-align: center;
        padding-top: 1rem;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
    }
    
    .auth-footer p {
        color: var(--gray-color);
        font-size: 0.95rem;
    }
    
    .auth-footer a {
        color: var(--primary-color);
        font-weight: 600;
        text-decoration: none;
        transition: color 0.3s ease;
    }
    
    .auth-footer a:hover {
        color: var(--secondary-color);
        text-decoration: underline;
    }
    
    /* Icono de cabecera */
    .auth-icon {
        font-size: 4rem;
        color: var(--primary-color);
        margin-bottom: 1rem;
    }
    
    /* Títulos */
    .auth-title {
        color: var(--dark-color);
        font-weight: 700;
        margin-bottom: 0.5rem;
        font-size: 2rem;
    }
    
    .auth-subtitle {
        color: var(--gray-color);
        font-size: 1rem;
        margin-bottom: 2rem;
    }
    
    /* Responsive */
    @media (max-width: 576px) {
        .auth-container {
            margin: 10px;
            padding: 0 10px;
        }
        
        .glass-card {
            padding: 1.5rem;
        }
        
        .auth-title {
            font-size: 1.75rem;
        }
    }
</style>

<div class="auth-container fade-in">
    <div class="glass-card">
        <div class="text-center">
            <i class="fas fa-check-circle auth-icon"></i>
            <h2 class="auth-title">Bienvenido</h2>
            <p class="auth-subtitle">Inicia sesión para continuar</p>
        </div>

        <form method="post" class="auth-form">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="modern-alert alert-danger">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-user me-2" style="color: var(--primary-color);"></i>
                    Usuario:
                </label>
                <input type="text" 
                       name="username" 
                       class="modern-input" 
                       placeholder="Ingresa tu usuario"
                       required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-lock me-2" style="color: var(--primary-color);"></i>
                    Contraseña:
                </label>
                <input type="password" 
                       name="password" 
                       class="modern-input" 
                       placeholder="Ingresa tu contraseña"
                       required>
            </div>

            <button type="submit" class="btn-modern btn-primary-modern">
                <i class="fas fa-sign-in-alt me-2"></i>
                Iniciar Sesión
            </button>

            <div class="auth-footer">
                <p class="mb-0">
                    ¿No tienes cuenta? 
                    <a href="{% url 'tareas:register' %}">
                        Regístrate <i class="fas fa-arrow-right ms-1"></i>
                    </a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
