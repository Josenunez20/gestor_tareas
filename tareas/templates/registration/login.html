{% extends 'base.html' %}

{% block title %}Iniciar Sesión | Gestor de Tareas{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-4">
        <div class="glass-card">
            <div class="text-center mb-4">
                <i class="fas fa-check-circle" style="font-size: 4rem; color: var(--primary-color);"></i>
                <h2 class="mt-3" style="color: var(--dark-color);">Bienvenido</h2>
                <p style="color: var(--gray-color);">Inicia sesión para continuar</p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="alert alert-danger modern-alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        Usuario o contraseña incorrectos.
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Usuario:</label>
                    <input type="text" name="username" class="modern-input" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Contraseña:</label>
                    <input type="password" name="password" class="modern-input" required>
                </div>

                <button type="submit" class="btn btn-primary-modern btn-modern w-100 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                </button>

                <p class="text-center mb-0">
                    ¿No tienes cuenta? 
                    <a href="{% url 'tareas:register' %}" style="color: var(--primary-color); font-weight: 600;">
                        Regístrate
                    </a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
